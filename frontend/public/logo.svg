<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6D6BFF" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#6D6BFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6D6BFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B7BFF"/>
      <stop offset="100%" stop-color="#5A54FF"/>
    </linearGradient>

    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="transparent"/>

  <circle cx="512" cy="512" r="290" fill="url(#glow)" filter="url(#blurGlow)"/>

  <rect x="262" y="262" width="500" height="500" rx="110" fill="url(#card)"/>

  <rect x="360" y="520" width="80" height="110" rx="18" fill="#D7D5FF" opacity="0.55"/>
  <rect x="470" y="450" width="80" height="180" rx="18" fill="#E6E5FF" opacity="0.75"/>
  <rect x="580" y="355" width="95" height="275" rx="20" fill="#FFFFFF"/>

  <path d="M400 520 C470 475, 540 415, 615 335"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="18"
        stroke-linecap="round"/>

  <circle cx="615" cy="335" r="26" fill="#FFFFFF"/>
</svg>