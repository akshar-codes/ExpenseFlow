<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — ExpenseTracker</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0c;
        color: #e4e4e7;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Sora, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: rgba(99, 102, 241, 0.12);
        border: 1px solid rgba(99, 102, 241, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
        color: #ffffff;
      }
      p {
        font-size: 14px;
        color: #a1a1aa;
        max-width: 340px;
        line-height: 1.6;
        margin: 0 0 24px;
      }
      button {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        border: none;
        padding: 10px 22px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">⚡</div>
      <h1>You're offline</h1>
      <p>
        ExpenseTracker can't reach the network right now. Any previously loaded
        pages and queued transactions are safe — reconnect and we'll pick up
        where you left off.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
